type Profile @table {
  displayName: String!
  bio: String!
  email: String!
  avatarUrl: String
  socialLinks: String
  resumeUrl: String
}

type Project @table {
  title: String!
  description: String!
  displayOrder: Int!
  imageUrl: String
  demoUrl: String
  repoUrl: String
  profile: Profile!
}

type Skill @table {
  name: String!
  category: String!
  proficiencyLevel: Int
  profile: Profile!
}

type ProjectTag @table {
  tagName: String!
  project: Project!
}

type Experience @table {
  companyName: String!
  roleTitle: String!
  startDate: Date!
  endDate: Date
  description: String
  profile: Profile!
}